<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - KinalApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f0f4ff; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: linear-gradient(135deg, #0f172a 0%, #1e2d4a 100%); height: 62px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 16px rgba(15,23,42,.4); border-bottom: 1px solid rgba(255,255,255,.06); }
    .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-size: 1.1rem; font-weight: 800; letter-spacing: -.03em; flex-shrink: 0; }
    .navbar-nav { display: flex; align-items: center; gap: 2px; list-style: none; }
    .navbar-nav a { color: rgba(255,255,255,.6); text-decoration: none; padding: 6px 11px; border-radius: 8px; font-size: .78rem; font-weight: 600; transition: background .18s, color .18s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .navbar-nav a:hover { background: rgba(255,255,255,.09); color: #fff; }
    .navbar-nav a.active { background: rgba(59,130,246,.25); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
    .navbar-user { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-logout { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.25); padding: 5px 12px; border-radius: 8px; font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .18s; }
    .page-content { flex: 1; padding: 28px 32px; max-width: 1200px; width: 100%; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .page-header h2 { font-size: 1.45rem; font-weight: 800; color: #0f172a; letter-spacing: -.03em; }
    .table-wrapper { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.05); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #0f172a; }
    th { padding: 13px 16px; text-align: left; font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: rgba(255,255,255,.7); }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 12px 16px; font-size: .875rem; color: #334155; font-weight: 500; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
    .badge-active { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .badge-inactive { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 8px; font-size: .84rem; font-weight: 700; text-decoration: none; cursor: pointer; border: none; transition: opacity .18s, transform .18s; font-family: inherit; white-space: nowrap; }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-warning { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; font-size: .78rem; padding: 5px 10px; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; font-size: .78rem; padding: 5px 10px; }
    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; font-size: .875rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .alert-success { background: #ecfdf5; color: #059669; border-left: 4px solid #059669; }
    .alert-error { background: #fef2f2; color: #dc2626; border-left: 4px solid #dc2626; }
    footer { background: #fff; border-top: 1px solid #e9eef6; color: #94a3b8; text-align: center; padding: 14px; font-size: .75rem; font-weight: 600; }
    @media (max-width: 800px) { .navbar { padding: 0 14px; height: auto; flex-wrap: wrap; gap: 8px; padding-block: 10px; } .navbar-nav { gap: 1px; flex-wrap: wrap; } .navbar-nav a { font-size: .72rem; padding: 5px 7px; } .page-content { padding: 16px; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/web/menu}">
    <img src="/css/logo.png" alt="KinalApp Logo" style="height:48px;width:auto;object-fit:contain;">
  </a>
  <ul class="navbar-nav">
    <li><a th:href="@{/web/menu}">🏠 Inicio</a></li>
    <li><a th:href="@{/clientes/web}">👥 Clientes</a></li>
    <li><a th:href="@{/productos/web}" class="active">📦 Productos</a></li>
    <!-- Visible para todos los usuarios autenticados -->
    <li><a th:href="@{/usuarios/web}">👤 Usuarios</a></li>
    <li><a th:href="@{/ventas/web}">💰 Ventas</a></li>
    <li><a th:href="@{/detalleventa/web}">🧾 Det. Ventas</a></li>
  </ul>
  <div class="navbar-user">
    <form th:action="@{/logout}" method="post" style="margin:0;">
      <button type="submit" class="btn-logout">🚪 Salir</button>
    </form>
  </div>
</nav>

<div class="page-content">
  <div class="page-header">
    <h2>📦 Productos</h2>
    <!-- Solo el ADMIN puede crear nuevos productos -->
    <div sec:authorize="hasRole('ADMIN')">
      <a th:href="@{/productos/web/nuevo}" class="btn btn-primary">➕ Nuevo Producto</a>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
  <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>Código</th><th>Nombre Producto</th><th>Precio</th><th>Stock</th><th>Estado</th>
        <!-- La columna de acciones solo se muestra al ADMIN -->
        <th sec:authorize="hasRole('ADMIN')">Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p : ${productos}">
        <td th:text="${p.codigoProducto}"></td>
        <td th:text="${p.nombreProducto}"></td>
        <td th:text="'Q ' + ${#numbers.formatDecimal(p.precio, 1, 2)}"></td>
        <td th:text="${p.stock}"></td>
        <td><span class="badge" th:classappend="${p.estado == 1} ? 'badge-active' : 'badge-inactive'" th:text="${p.estado == 1} ? 'Activo' : 'Inactivo'"></span></td>
        <!-- Los botones de editar y eliminar solo los ve el ADMIN -->
        <td sec:authorize="hasRole('ADMIN')" style="display:flex;gap:6px;">
          <a th:href="@{/productos/web/editar/{codigo}(codigo=${p.codigoProducto})}" class="btn btn-warning">✏️ Editar</a>
          <a th:href="@{/productos/web/eliminar/{codigo}(codigo=${p.codigoProducto})}" class="btn btn-danger" onclick="return confirm('¿Eliminar este producto?')">🗑️ Eliminar</a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(productos)}">
        <td colspan="6" style="text-align:center;color:#6b7280;padding:24px;">No hay productos registrados.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<footer><p>&copy; 2025 KinalApp — Sistema de Ventas</p></footer>
</body>
</html>
